<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus ERP - Admin Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #loginView {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        #dashboardView { display: none; }
        .login-card { width: 100%; max-width: 400px; padding: 3rem; }
        .sidebar-nav { list-style: none; margin-top: 2rem; }
        .sidebar-nav li { margin-bottom: 0.5rem; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 0.5rem;
            transition: var(--transition);
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: var(--glass);
            color: var(--text);
        }
    </style>
</head>
<body>
    <!-- Login View -->
    <div id="loginView">
        <div class="login-card glass">
            <h2 style="text-align: center; margin-bottom: 2rem;">Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login_user" class="form-control" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login_pass" class="form-control" required placeholder="admin123">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login to Dashboard</button>
                <div id="loginMessage" style="margin-top: 1rem; text-align: center; color: #ef4444; font-size: 0.9rem;"></div>
            </form>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="admin-layout">
        <aside class="sidebar">
            <div class="logo" style="margin-bottom: 2rem;">Nexus Admin</div>
            <ul class="sidebar-nav">
                <li><a href="#" class="active" onclick="showSection('requests')"><i class="fas fa-list-ul"></i> ERP Requests</a></li>
                <li><a href="#" onclick="showSection('users')"><i class="fas fa-users-cog"></i> User Accounts</a></li>
                <li style="margin-top: 4rem;"><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                <h1 id="sectionTitle">ERP Order Requests</h1>
                <div class="glass" style="padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem;">
                    <i class="fas fa-user-circle"></i> <span id="currentAdmin">Admin</span>
                </div>
            </header>

            <!-- Requests Section -->
            <section id="sectionRequests">
                <div class="stat-grid">
                    <div class="stat-card glass">
                        <div style="color: var(--text-muted); font-size: 0.9rem;">Total Requests</div>
                        <div id="statTotal" style="font-size: 2rem; font-weight: 800;">0</div>
                    </div>
                    <div class="stat-card glass">
                        <div style="color: var(--text-muted); font-size: 0.9rem;">Pending</div>
                        <div id="statPending" style="font-size: 2rem; font-weight: 800; color: #f59e0b;">0</div>
                    </div>
                </div>

                <div class="table-container glass" style="padding: 1rem;">
                    <table>
                        <thead>
                            <tr>
                                <th>Company</th>
                                <th>Contact</th>
                                <th>Package</th>
                                <th>Users</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="requestsTable">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Users Section -->
            <section id="sectionUsers" style="display: none;">
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
                    <div class="glass" style="padding: 2rem;">
                        <h3>Create New Admin</h3>
                        <form id="newUserForm" style="margin-top: 1.5rem;">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="new_user" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="new_full_name" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="new_pass" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
                        </form>
                    </div>
                    <div class="table-container glass" style="padding: 1rem;">
                        <h3>Active Administrators</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Username</th>
                                    <th>Full Name</th>
                                    <th>Created At</th>
                                </tr>
                            </thead>
                            <tbody id="usersTable">
                                <!-- Data will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
